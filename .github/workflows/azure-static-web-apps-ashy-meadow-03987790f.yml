name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'rentcar-ec-frontend/**'
      - '.github/workflows/azure-static-web-apps-ashy-meadow-03987790f.yml'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: rentcar-ec-frontend
        run: npm ci

      - name: Build frontend
        working-directory: rentcar-ec-frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "rentcar-ec-frontend/dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
